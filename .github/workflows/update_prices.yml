name: Daily Market Price Tracker

# Runs at 00:00 UTC every day, and allows manual triggering
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Run Market Scraper
        env:
          REVERB_API_TOKEN: ${{ secrets.REVERB_API_TOKEN }}
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add README.md
          
          # Only commit if there are actual changes to prevent empty commits
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated Market Price Update"
          git push
